<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Rodeo Road Log — Demo</title>
<style>
  /* ---- Design tokens (western leather-goods palette from the original app) ---- */
  :root{
    --cream:#F3EBDC;
    --charcoal:#2A211B;
    --leather:#5C3A21;
    --rust:#BE4B23;
    --gold:#D99A3D;
    --teal:#2E8B8B;
    --denim:#3D5A73;
    --card:#FFFDF8;
    --font-display:'Arial Narrow','Helvetica Neue Condensed',Impact,system-ui,sans-serif;
    --font-body:ui-sans-serif,system-ui,-apple-system,'Segoe UI',Roboto,sans-serif;
    --font-mono:ui-monospace,'SF Mono','JetBrains Mono',Menlo,Consolas,monospace;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  /* Commit to the warm cream world in either OS/viewer theme — this app is deliberately single-look. */
  body{
    background:var(--cream);
    color:var(--charcoal);
    font-family:var(--font-body);
    -webkit-font-smoothing:antialiased;
    min-height:100vh;
  }
  button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit;}
  input,textarea,select{font-family:inherit;}
  a{color:inherit;}
  .font-display{font-family:var(--font-display);font-weight:800;letter-spacing:.01em;}
  .font-mono{font-family:var(--font-mono);}
  :focus-visible{outline:3px solid var(--gold);outline-offset:2px;border-radius:6px;}

  .wrap{max-width:680px;margin:0 auto;padding:16px;}
  .row{display:flex;align-items:center;}
  .between{justify-content:space-between;}
  .gap2{gap:8px;} .gap3{gap:12px;} .gap4{gap:16px;}
  .grow{flex:1;}
  .hide-sm{display:none;}
  @media(min-width:640px){ .hide-sm{display:inline;} }

  /* ---- Top bar ---- */
  .topbar{
    position:sticky;top:0;z-index:20;
    display:flex;align-items:center;justify-content:space-between;
    padding:12px 16px;background:var(--charcoal);
    box-shadow:0 4px 14px rgba(0,0,0,.18);
  }
  .brand{font-family:var(--font-display);font-weight:800;font-size:26px;letter-spacing:.03em;color:var(--cream);cursor:pointer;}
  .tabs{display:flex;gap:4px;}
  .tab{display:flex;align-items:center;gap:6px;padding:7px 13px;border-radius:999px;font-size:14px;font-weight:700;color:#C9BFAE;transition:background .15s,color .15s;}
  .tab.active{background:var(--rust);color:var(--cream);}

  /* ---- Stat pills ---- */
  .stats{display:flex;gap:12px;padding:0 16px;margin-top:-32px;position:relative;z-index:10;}
  .pill{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;
    background:var(--card);border:2px solid rgba(217,154,61,.2);border-radius:18px;padding:16px 12px;
    box-shadow:0 6px 18px rgba(42,33,27,.08);}
  .pill .num{font-family:var(--font-mono);font-size:26px;font-weight:700;margin-top:4px;}
  .pill .lbl{font-size:11px;text-transform:uppercase;letter-spacing:.08em;color:var(--leather);margin-top:2px;text-align:center;}

  /* ---- Hero ---- */
  .hero{position:relative;width:100%;height:56vh;min-height:320px;overflow:hidden;}
  .hero img{width:100%;height:100%;object-fit:cover;object-position:50% 30%;display:block;}
  .hero .scrim{position:absolute;inset:0;background:linear-gradient(180deg,rgba(42,33,27,0) 30%,rgba(42,33,27,.85) 92%);}
  .hero .cap{position:absolute;left:0;right:0;bottom:0;padding:0 20px 26px;}
  .hero h1{font-family:var(--font-display);font-weight:800;font-size:52px;line-height:.92;color:var(--cream);margin:0;text-shadow:0 2px 12px rgba(0,0,0,.4);}
  .hero p{margin:8px 0 0;color:#E9DEC9;font-size:15px;max-width:34ch;}
  @media(min-width:640px){ .hero h1{font-size:64px;} }

  /* ---- Cards / generic ---- */
  .navgrid{display:grid;gap:12px;padding:24px 16px 40px;}
  @media(min-width:640px){ .navgrid{grid-template-columns:repeat(3,1fr);} }
  .navcard{display:flex;align-items:center;gap:16px;background:var(--card);border-radius:18px;padding:16px;text-align:left;
    box-shadow:0 3px 10px rgba(42,33,27,.06);transition:box-shadow .15s,transform .15s;}
  .navcard:hover{box-shadow:0 10px 24px rgba(42,33,27,.14);transform:translateY(-2px);}
  .navcard .badge{width:48px;height:48px;border-radius:14px;display:flex;align-items:center;justify-content:center;flex:none;}
  .navcard .t{font-family:var(--font-display);font-weight:800;font-size:20px;line-height:1.05;}
  .navcard .s{font-size:12px;color:var(--leather);margin-top:2px;}

  .card{background:var(--card);border:2px solid rgba(217,154,61,.2);border-radius:18px;padding:16px;box-shadow:0 3px 10px rgba(42,33,27,.05);}
  .list{display:flex;flex-direction:column;gap:12px;}
  .grid2{display:grid;gap:12px;}
  @media(min-width:640px){ .grid2{grid-template-columns:repeat(2,1fr);} }

  .title{font-family:var(--font-display);font-weight:800;font-size:26px;}
  .muted{color:var(--leather);}
  .chip{display:inline-flex;align-items:center;gap:5px;font-size:12px;font-weight:700;padding:3px 9px;border-radius:999px;}
  .chip.denim{background:rgba(61,90,115,.14);color:var(--denim);}
  .chip.teal{background:rgba(46,139,139,.15);color:var(--teal);}

  .btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;border-radius:999px;font-weight:700;font-size:14px;padding:9px 16px;color:#fff;transition:filter .15s;white-space:nowrap;flex:none;}
  .btn:hover{filter:brightness(1.06);}
  .btn.rust{background:var(--rust);} .btn.denim{background:var(--denim);} .btn.teal{background:var(--teal);}
  .btn-block{width:100%;padding:13px;border-radius:999px;font-weight:800;font-size:15px;color:#fff;}
  .icon-btn{padding:7px;border-radius:999px;background:var(--cream);display:inline-flex;}
  .selectlike{font-size:14px;border-radius:999px;padding:7px 13px;border:2px solid rgba(217,154,61,.35);background:#fff;color:var(--leather);}

  .empty{text-align:center;padding:64px 0;color:var(--leather);}
  .empty .title{margin-top:8px;}

  .time{font-family:var(--font-mono);font-size:26px;font-weight:700;color:var(--rust);line-height:1;}
  .tny{font-size:10px;text-transform:uppercase;letter-spacing:.1em;color:var(--leather);}

  /* ---- Modal ---- */
  .overlay{position:fixed;inset:0;z-index:30;background:rgba(42,33,27,.55);display:flex;align-items:flex-end;justify-content:center;}
  @media(min-width:640px){ .overlay{align-items:center;padding:16px;} }
  .sheet{width:100%;max-height:92vh;overflow-y:auto;background:var(--card);border-radius:22px 22px 0 0;}
  @media(min-width:640px){ .sheet{max-width:520px;border-radius:20px;} }
  .sheet .head{position:sticky;top:0;background:var(--card);display:flex;align-items:center;justify-content:space-between;
    padding:16px 20px;border-bottom:2px solid rgba(217,154,61,.22);}
  .sheet .body{padding:20px;}
  .field{margin-bottom:16px;}
  .field > label{display:block;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--leather);margin-bottom:6px;}
  .inp{width:100%;padding:10px 12px;border-radius:10px;border:2px solid rgba(217,154,61,.4);background:#fff;font-size:15px;color:var(--charcoal);}
  textarea.inp{min-height:72px;resize:vertical;}
  .seg{display:flex;gap:8px;}
  .seg button{flex:1;display:flex;align-items:center;justify-content:center;gap:6px;padding:10px;border-radius:12px;font-weight:700;font-size:14px;text-transform:capitalize;border:2px solid rgba(46,139,139,.35);background:#fff;color:var(--leather);}
  .seg button.on{background:var(--teal);color:#fff;}
  .stars{display:flex;gap:4px;}
  .stars button{padding:2px;}
  .toggle{display:inline-flex;align-items:center;gap:8px;padding:9px 13px;border-radius:12px;font-weight:700;font-size:14px;border:2px solid rgba(61,90,115,.35);background:#fff;color:var(--leather);}
  .toggle.on{background:var(--denim);color:#fff;}
  .demo-tag{position:fixed;bottom:10px;right:10px;z-index:5;background:rgba(42,33,27,.82);color:var(--cream);font-size:11px;letter-spacing:.04em;padding:5px 10px;border-radius:999px;pointer-events:none;}
  .line2{display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;}
</style>
</head>
<body>
<div id="app"></div>
<div class="demo-tag">Demo — data saved in this browser</div>

/* ---- helpers ---- */
var seq=0;
function uid(){ return 'id'+Math.abs((Date.now()^(performance.now()*1000|0))).toString(36)+(seq++); }
function esc(s){ return String(s==null?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function fmtTime(sec){ if(sec===''||sec==null||isNaN(sec)) return '--'; return Number(sec).toFixed(2); }
function fmtDate(d){ if(!d) return ''; var dt=new Date(d+'T00:00:00'); if(isNaN(dt)) return d;
  return dt.toLocaleDateString(undefined,{month:'short',day:'numeric',year:'numeric'}); }

function save(key,v){ try{ localStorage.setItem(key,JSON.stringify(v)); }catch(e){} }

/* ---- state ---- */
var S = {
  view:'home',
  runs:load('runs',[]),
  travel:load('travel',[]),
  arenaNotes:load('arena-notes',{}),
  modal:null,     // {kind, ...}
  form:null,      // working copy for modal forms
  runFilter:'all',
  runSort:'date-desc'
};
function persist(){ save('runs',S.runs); save('travel',S.travel); save('arena-notes',S.arenaNotes); }
function arenas(){
  var set={}; S.runs.forEach(function(r){ if(r.arena) set[r.arena]=1; });
  Object.keys(S.arenaNotes).forEach(function(a){ set[a]=1; });
  return Object.keys(set).sort();
}
function bestTime(){
  var t=S.runs.map(function(r){return Number(r.time);}).filter(function(n){return !isNaN(n)&&n>0;});
  return t.length?Math.min.apply(null,t):null;
}

/* ---- shared bits ---- */
function topbar(current){
  var tabs=[['home','Home','home'],['runs','Runs','timer'],['arenas','Arenas','mappin'],['travel','Travel','hotel']];
  return '<div class="topbar">'+
    '<div class="brand" data-nav="home">RODEO ROAD LOG</div>'+
    '<div class="tabs">'+tabs.map(function(t){
      var on=current===t[0];
      return '<button class="tab'+(on?' active':'')+'" data-nav="'+t[0]+'">'+icon(t[2],15,on?'#F3EBDC':'#C9BFAE')+'<span class="hide-sm">'+t[1]+'</span></button>';
    }).join('')+'</div></div>';
}

/* ---- HOME ---- */
function viewHome(){
  var cards=[
    ['runs','Log a run','Times, arenas, video','timer','var(--rust)'],
    ['arenas','Arenas','Compare & remember','mappin','var(--denim)'],
    ['travel','On the road','Hotels & campgrounds','hotel','var(--teal)']
  ];
  var bt=bestTime();
  return '<div class="hero">'+
      '<img src="'+HERO_IMG+'" alt="Barrel racing" />'+
      '<div class="scrim"></div>'+
      '<div class="cap"><h1>RODEO ROAD LOG</h1><p>Every run, every arena, every stop on the road — in one place.</p></div>'+
    '</div>'+
    '<div class="stats">'+
      pill('Runs logged',S.runs.length,'flag')+
      pill('Arenas',arenas().length,'mappin')+
      pill('Best time',bt?fmtTime(bt):'--','timer')+
    '</div>'+
    '<div class="navgrid">'+cards.map(function(c){
      return '<button class="navcard" data-nav="'+c[0]+'">'+
        '<div class="badge" style="background:'+c[4]+'">'+icon(c[3],24,'#fff')+'</div>'+
        '<div class="grow"><div class="t">'+c[1]+'</div><div class="s">'+c[2]+'</div></div>'+
        icon('chevron',18,'var(--leather)')+'</button>';
    }).join('')+'</div>';
}
function pill(label,value,ic){
  return '<div class="pill">'+icon(ic,20,'var(--rust)')+'<div class="num">'+value+'</div><div class="lbl">'+label+'</div></div>';
}

/* ---- RUNS ---- */
function viewRuns(){
  var list=S.runs.filter(function(r){return S.runFilter==='all'||r.arena===S.runFilter;})
    .sort(function(a,b){
      if(S.runSort==='date-desc') return (b.date||'').localeCompare(a.date||'');
      if(S.runSort==='date-asc') return (a.date||'').localeCompare(b.date||'');
      if(S.runSort==='time-asc') return (Number(a.time)||999)-(Number(b.time)||999);
      return 0;
    });
  var sortLbl=S.runSort==='date-desc'?'Newest':S.runSort==='date-asc'?'Oldest':'Fastest';
  var opts='<option value="all">All arenas</option>'+arenas().map(function(a){
    return '<option value="'+esc(a)+'"'+(S.runFilter===a?' selected':'')+'>'+esc(a)+'</option>';}).join('');
  var body=topbar('runs')+'<div class="wrap">'+
    '<div class="row between gap2" style="margin-bottom:12px;flex-wrap:wrap;">'+
      '<div class="row gap2 grow" style="flex:1 1 200px;min-width:0;">'+
        '<select class="selectlike" data-runfilter style="min-width:0;flex:1;">'+opts+'</select>'+
        '<button class="selectlike row gap2" data-runsort style="white-space:nowrap;flex:none;">'+icon('sort',13,'var(--leather)')+sortLbl+'</button>'+
      '</div>'+
      '<button class="btn rust" data-newrun>'+icon('plus',16,'#fff')+'Log run</button>'+
    '</div>';
  if(list.length===0){
    body+='<div class="empty">'+icon('timer',32,'var(--leather)')+'<div class="title">No runs yet</div><div>Tap &ldquo;Log run&rdquo; to add your first one.</div></div>';
  }
  body+='<div class="list">'+list.map(function(r){
    return '<div class="card">'+
      '<div class="row between" style="align-items:flex-start;">'+
        '<div><div class="font-display" style="font-size:20px;font-weight:800;line-height:1.05;">'+esc(r.event)+'</div>'+
          '<div class="muted" style="font-size:12px;margin-top:2px;">'+esc(fmtDate(r.date))+'</div>'+
          '<div class="chip denim" style="margin-top:6px;">'+icon('mappin',11,'var(--denim)')+esc(r.arena)+'</div></div>'+
        '<div style="text-align:right;"><div class="time">'+fmtTime(r.time)+'</div><div class="tny">seconds</div></div>'+
      '</div>'+
      (r.notes?'<div style="font-size:14px;margin-top:8px;">'+esc(r.notes)+'</div>':'')+
      '<div class="row between" style="margin-top:12px;">'+
        (r.videoLink?'<a class="chip teal" href="'+esc(r.videoLink)+'" target="_blank" rel="noreferrer">'+icon('video',12,'var(--teal)')+'Watch run</a>':'<span></span>')+
        '<div class="row gap2">'+
          '<button class="icon-btn" data-editrun="'+r.id+'">'+icon('pencil',14,'var(--leather)')+'</button>'+
          '<button class="icon-btn" data-delrun="'+r.id+'">'+icon('trash',14,'var(--rust)')+'</button>'+
        '</div>'+
      '</div>'+
    '</div>';
  }).join('')+'</div></div>';
  return body;
}

/* ---- ARENAS ---- */
function viewArenas(){
  var stats=arenas().map(function(name){
    var times=S.runs.filter(function(r){return r.arena===name;}).map(function(r){return Number(r.time);}).filter(function(n){return !isNaN(n)&&n>0;});
    return {name:name,count:times.length,best:times.length?Math.min.apply(null,times):null};
  });
  var body=topbar('arenas')+'<div class="wrap">'+
    '<div class="row between" style="margin-bottom:12px;">'+
      '<div class="title">Arenas</div>'+
      '<button class="btn denim" data-newarena>'+icon('plus',16,'#fff')+'Add arena</button>'+
    '</div>';
  if(stats.length===0){
    body+='<div class="empty">'+icon('mappin',32,'var(--leather)')+'<div class="title">No arenas yet</div><div>Log a run or add one manually.</div></div>';
  }
  body+='<div class="grid2">'+stats.map(function(a){
    var note=S.arenaNotes[a.name];
    return '<button class="card" style="text-align:left;" data-arena="'+esc(a.name)+'">'+
      '<div class="row between" style="align-items:flex-start;"><div class="font-display" style="font-size:20px;font-weight:800;line-height:1.05;padding-right:8px;">'+esc(a.name)+'</div>'+icon('mappin',16,'var(--denim)')+'</div>'+
      '<div class="row gap4" style="margin-top:8px;font-size:14px;">'+
        '<span class="muted">'+a.count+' run'+(a.count===1?'':'s')+'</span>'+
        (a.best!==null?'<span class="font-mono" style="font-weight:700;color:var(--rust);">Best '+fmtTime(a.best)+'</span>':'')+
      '</div>'+
      (note?'<div class="line2 muted" style="font-size:12px;margin-top:8px;">'+esc(note)+'</div>':'')+
    '</button>';
  }).join('')+'</div></div>';
  return body;
}

/* ---- TRAVEL ---- */
function viewTravel(){
  var list=S.travel.slice().sort(function(a,b){return (b.startDate||'').localeCompare(a.startDate||'');});
  var body=topbar('travel')+'<div class="wrap">'+
    '<div class="row between" style="margin-bottom:12px;">'+
      '<div class="title">On the Road</div>'+
      '<button class="btn teal" data-newstay>'+icon('plus',16,'#fff')+'Log a stay</button>'+
    '</div>';
  if(list.length===0){
    body+='<div class="empty">'+icon('hotel',32,'var(--leather)')+'<div class="title">No stays logged yet</div><div>Tap &ldquo;Log a stay&rdquo; after your next trip.</div></div>';
  }
  body+='<div class="list">'+list.map(function(t){
    var stars='';for(var i=0;i<5;i++){stars+=icon('star',13,'var(--gold)',i<t.rating?'var(--gold)':'none');}
    var dates=esc(fmtDate(t.startDate))+(t.endDate&&t.endDate!==t.startDate?' &ndash; '+esc(fmtDate(t.endDate)):'');
    return '<div class="card">'+
      '<div class="row between" style="align-items:flex-start;">'+
        '<div><div class="row gap2">'+icon(t.type==='hotel'?'hotel':'tent',15,'var(--teal)')+'<div class="font-display" style="font-size:20px;font-weight:800;line-height:1.05;">'+esc(t.name)+'</div></div>'+
          '<div class="muted" style="font-size:12px;margin-top:2px;">'+dates+'</div></div>'+
        '<div class="row" style="gap:2px;">'+stars+'</div>'+
      '</div>'+
      (t.ada?'<div style="margin-top:8px;"><span class="chip denim">'+icon('accessibility',11,'var(--denim)')+'ADA room</span></div>':'')+
      (t.notes?'<div style="font-size:14px;margin-top:8px;">'+esc(t.notes)+'</div>':'')+
      '<div class="row" style="justify-content:flex-end;gap:8px;margin-top:12px;">'+
        '<button class="icon-btn" data-editstay="'+t.id+'">'+icon('pencil',14,'var(--leather)')+'</button>'+
        '<button class="icon-btn" data-delstay="'+t.id+'">'+icon('trash',14,'var(--rust)')+'</button>'+
      '</div>'+
    '</div>';
  }).join('')+'</div></div>';
  return body;
}

/* ---- MODALS ---- */
function modalShell(title,inner){
  return '<div class="overlay" data-overlay><div class="sheet" data-sheet onclick="event.stopPropagation()">'+
    '<div class="head"><div class="title">'+esc(title)+'</div><button class="icon-btn" data-closemodal>'+icon('x',18,'var(--charcoal)')+'</button></div>'+
    '<div class="body">'+inner+'</div></div></div>';
}
function field(label,inner){ return '<div class="field"><label>'+esc(label)+'</label>'+inner+'</div>'; }

function renderModal(){
  if(!S.modal) return '';
  var m=S.modal, f=S.form;
  if(m.kind==='run'){
    var alist=arenas().map(function(a){return '<option value="'+esc(a)+'"></option>';}).join('');
    return modalShell(m.editing?'Edit run':'Log a run',
      field('Event / Rodeo name','<input class="inp" data-f="event" value="'+esc(f.event)+'" placeholder="e.g. College National Finals">')+
      field('Date','<input class="inp" type="date" data-f="date" value="'+esc(f.date)+'">')+
      field('Arena','<input class="inp" data-f="arena" list="arena-sug" value="'+esc(f.arena)+'" placeholder="e.g. Weber County Fairgrounds"><datalist id="arena-sug">'+alist+'</datalist>')+
      field('Time (seconds)','<input class="inp" type="number" step="0.01" data-f="time" value="'+esc(f.time)+'" placeholder="17.23">')+
      field('Video link','<input class="inp" data-f="videoLink" value="'+esc(f.videoLink)+'" placeholder="Paste a link for now">')+
      field('Notes','<textarea class="inp" data-f="notes" placeholder="Wide first turn, watch the gate...">'+esc(f.notes)+'</textarea>')+
      '<button class="btn-block" style="background:var(--rust)" data-saverun>Save run</button>');
  }
  if(m.kind==='arenaDetail'){
    var runs=S.runs.filter(function(r){return r.arena===m.name;}).sort(function(a,b){return (Number(a.time)||999)-(Number(b.time)||999);});
    var rows=runs.map(function(r){
      return '<div class="row between" style="background:var(--cream);border-radius:12px;padding:8px 12px;">'+
        '<div><div style="font-size:14px;font-weight:700;">'+esc(r.event)+'</div><div class="muted" style="font-size:12px;">'+esc(fmtDate(r.date))+'</div></div>'+
        '<div class="font-mono" style="font-weight:700;color:var(--rust);">'+fmtTime(r.time)+'</div></div>';
    }).join('');
    if(runs.length===0) rows='<div class="muted" style="font-size:14px;">No runs logged here yet.</div>';
    return modalShell(m.name,
      '<div class="field"><label>Times here, fastest first</label><div class="list" style="gap:8px;">'+rows+'</div></div>'+
      field('Tips & tricks for this arena','<textarea class="inp" style="min-height:90px;" data-f="note" placeholder="e.g. Ground is deep near barrel 3, take it wider...">'+esc(f.note)+'</textarea>')+
      '<button class="btn-block" style="background:var(--denim)" data-savenote>Save notes</button>');
  }
  if(m.kind==='arenaNew'){
    return modalShell('Add an arena',
      field('Arena name','<input class="inp" data-f="name" value="'+esc(f.name)+'" placeholder="e.g. Utah State Fairpark">')+
      '<button class="btn-block" style="background:var(--denim)" data-savearena>Add arena</button>');
  }
  if(m.kind==='travel'){
    var stars='';for(var i=0;i<5;i++){stars+='<button data-star="'+(i+1)+'">'+icon('star',26,'var(--gold)',i<f.rating?'var(--gold)':'none')+'</button>';}
    return modalShell(m.editing?'Edit stay':'Log a stay',
      field('Type','<div class="seg">'+['hotel','campground'].map(function(o){
        return '<button data-type="'+o+'" class="'+(f.type===o?'on':'')+'">'+icon(o==='hotel'?'hotel':'tent',15)+o+'</button>';}).join('')+'</div>')+
      field('Name','<input class="inp" data-f="name" value="'+esc(f.name)+'" placeholder="e.g. Best Western Fairgrounds Inn">')+
      '<div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;">'+
        field('Check-in','<input class="inp" type="date" data-f="startDate" value="'+esc(f.startDate)+'">')+
        field('Check-out','<input class="inp" type="date" data-f="endDate" value="'+esc(f.endDate)+'">')+
      '</div>'+
      field('Rating','<div class="stars">'+stars+'</div>')+
      field('ADA accessible room','<button class="toggle '+(f.ada?'on':'')+'" data-ada>'+icon('accessibility',16)+(f.ada?'Yes':'No')+'</button>')+
      field('Notes','<textarea class="inp" data-f="notes" placeholder="Pet-friendly, close to arena, noisy AC...">'+esc(f.notes)+'</textarea>')+
      '<button class="btn-block" style="background:var(--teal)" data-savestay>Save stay</button>');
  }
  return '';
}

/* ---- render ---- */
function render(){
  var v = S.view==='runs'?viewRuns():S.view==='arenas'?viewArenas():S.view==='travel'?viewTravel():viewHome();
  document.getElementById('app').innerHTML = v + renderModal();
}

/* ---- events ---- */
document.addEventListener('click',function(e){
  var t=e.target.closest('[data-nav],[data-newrun],[data-editrun],[data-delrun],[data-runsort],[data-newarena],[data-arena],[data-newstay],[data-editstay],[data-delstay],[data-closemodal],[data-overlay],[data-saverun],[data-savenote],[data-savearena],[data-savestay],[data-type],[data-star],[data-ada]');
  if(!t) return;

  if(t.hasAttribute('data-nav')){ S.view=t.getAttribute('data-nav'); S.modal=null; render(); return; }

  // runs
  if(t.hasAttribute('data-newrun')){ S.form={id:uid(),date:'',event:'',arena:'',time:'',videoLink:'',notes:''}; S.modal={kind:'run',editing:false}; render(); return; }
  if(t.hasAttribute('data-editrun')){ var r=S.runs.find(function(x){return x.id===t.getAttribute('data-editrun');}); S.form=Object.assign({},r); S.modal={kind:'run',editing:true}; render(); return; }
  if(t.hasAttribute('data-delrun')){ S.runs=S.runs.filter(function(x){return x.id!==t.getAttribute('data-delrun');}); persist(); render(); return; }
  if(t.hasAttribute('data-runsort')){ S.runSort=S.runSort==='date-desc'?'date-asc':S.runSort==='date-asc'?'time-asc':'date-desc'; render(); return; }
  if(t.hasAttribute('data-saverun')){
    var f=S.form; if(!f.event||!f.arena) return;
    var ex=S.runs.some(function(x){return x.id===f.id;});
    S.runs = ex? S.runs.map(function(x){return x.id===f.id?f:x;}) : S.runs.concat([f]);
    persist(); S.modal=null; render(); return;
  }

  // arenas
  if(t.hasAttribute('data-newarena')){ S.form={name:''}; S.modal={kind:'arenaNew'}; render(); return; }
  if(t.hasAttribute('data-arena')){ var nm=t.getAttribute('data-arena'); S.form={note:S.arenaNotes[nm]||''}; S.modal={kind:'arenaDetail',name:nm}; render(); return; }
  if(t.hasAttribute('data-savenote')){ S.arenaNotes[S.modal.name]=S.form.note; persist(); S.modal=null; render(); return; }
  if(t.hasAttribute('data-savearena')){ var n=(S.form.name||'').trim(); if(!n) return; if(!(n in S.arenaNotes)) S.arenaNotes[n]=''; persist(); S.modal=null; render(); return; }

  // travel
  if(t.hasAttribute('data-newstay')){ S.form={id:uid(),startDate:'',endDate:'',type:'hotel',name:'',ada:false,rating:0,notes:''}; S.modal={kind:'travel',editing:false}; render(); return; }
  if(t.hasAttribute('data-editstay')){ var s=S.travel.find(function(x){return x.id===t.getAttribute('data-editstay');}); S.form=Object.assign({},s); S.modal={kind:'travel',editing:true}; render(); return; }
  if(t.hasAttribute('data-delstay')){ S.travel=S.travel.filter(function(x){return x.id!==t.getAttribute('data-delstay');}); persist(); render(); return; }
  if(t.hasAttribute('data-type')){ S.form.type=t.getAttribute('data-type'); render(); return; }
  if(t.hasAttribute('data-star')){ S.form.rating=Number(t.getAttribute('data-star')); render(); return; }
  if(t.hasAttribute('data-ada')){ S.form.ada=!S.form.ada; render(); return; }
  if(t.hasAttribute('data-savestay')){
    var ff=S.form; if(!ff.name) return;
    var e2=S.travel.some(function(x){return x.id===ff.id;});
    S.travel = e2? S.travel.map(function(x){return x.id===ff.id?ff:x;}) : S.travel.concat([ff]);
    persist(); S.modal=null; render(); return;
  }

  // modal close
  if(t.hasAttribute('data-closemodal')||t.hasAttribute('data-overlay')){ S.modal=null; render(); return; }
});

// text inputs update the working form without re-rendering (keeps focus)
document.addEventListener('input',function(e){
  var el=e.target.closest('[data-f]'); if(!el||!S.form) return;
  S.form[el.getAttribute('data-f')]=el.value;
});
document.addEventListener('change',function(e){
  var el=e.target.closest('[data-runfilter]'); if(el){ S.runFilter=el.value; render(); }
});
document.addEventListener('keydown',function(e){
  if(e.key==='Escape'&&S.modal){ S.modal=null; render(); }
});

render();
</script>
</body>
</html>
