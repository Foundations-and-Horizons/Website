<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Foundations &amp; Horizons — Volunteer Hub</title>
<!--
  ============================================================================
  Volunteer Hub — single-file demo app for Foundations & Horizons
  ----------------------------------------------------------------------------
  BACKEND: This demo runs entirely in the browser on a localStorage data layer
  (DB.*) seeded with FAKE data. No server required — just open the file.

  To point it at a real Supabase project later, set SUPABASE_URL / SUPABASE_KEY
  below and swap the DB.* calls for the sb* fetch helpers (same shapes). The
  table schema lives in supabase_schema.sql.
  ============================================================================
-->
<style>
:root{
  /* Brand — Foundations & Horizons (azure blue + charcoal) */
  --primary:#1C86D5; --primary-dark:#14639E; --primary-light:#E3F0FB; --primary-text:#0C4A75;
  --charcoal:#4A4A4A; --charcoal-dark:#333333;

  /* Semantic */
  --amber:#E8952B; --amber-light:#FDF1DF; --amber-text:#8A560F;
  --red:#E24B4A;   --red-light:#FCEBEB;   --red-text:#A32D2D;
  --blue:#1C86D5;  --blue-light:#E3F0FB;  --blue-text:#0C4A75;
  --green:#2AA198; --green-light:#E6F7F5; --green-dark:#177E75; --green-text:#12655E;
  --purple:#6D5AE0;--purple-light:#EDEBFB;--purple-text:#3B2E9C;

  /* Surfaces */
  --bg:#F5F8FB; --surface:#FFFFFF; --surface-2:#F8FAFC; --border:#E2EAF2; --border-strong:#CBD8E6;

  /* Type */
  --text:#1E2A38; --text-muted:#5A6B7B; --text-faint:#93A3B4;

  /* Shape */
  --radius:14px; --radius-sm:9px;
  --shadow-sm:0 1px 3px rgba(20,60,100,.06);
  --shadow:0 2px 10px rgba(20,60,100,.08);
  --shadow-lg:0 10px 34px rgba(20,60,100,.16);
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{font-family:system-ui,-apple-system,"Segoe UI",Roboto,sans-serif;background:var(--bg);color:var(--text);font-size:14px;line-height:1.5}
a{color:var(--primary);text-decoration:none}
button{font-family:inherit;cursor:pointer}
input,select,textarea{font-family:inherit;font-size:14px}

/* ---- password gate ---- */
#gate{position:fixed;inset:0;z-index:9999;background:linear-gradient(150deg,#0C4A75,#1C86D5);display:flex;align-items:center;justify-content:center;padding:20px}
#gate .card{background:#fff;border-radius:20px;padding:40px 36px;max-width:380px;width:100%;text-align:center;box-shadow:var(--shadow-lg)}
#gate .logo{width:190px;margin:0 auto 18px;display:block}
#gate h1{font-size:16px;color:var(--text-muted);font-weight:600;margin-bottom:22px}
#gate input{width:100%;padding:13px 15px;border:1.5px solid var(--border-strong);border-radius:11px;margin-bottom:12px;text-align:center;font-size:16px}
#gate input:focus{outline:none;border-color:var(--primary)}
#gate button{width:100%;padding:13px;background:var(--primary);color:#fff;border:none;border-radius:11px;font-size:15px;font-weight:600}
#gate .hint{margin-top:14px;font-size:12px;color:var(--text-faint)}
#gate .err{color:var(--red);font-size:13px;height:16px;margin-bottom:6px}

/* ---- goal banner ---- */
#goalBanner{position:fixed;top:0;left:0;right:0;height:34px;background:var(--primary);color:#fff;display:flex;align-items:center;overflow:hidden;z-index:50;font-size:13px;font-weight:500}
#goalBanner .track{white-space:nowrap;animation:marquee 34s linear infinite;padding-left:100%}
@keyframes marquee{to{transform:translateX(-100%)}}

/* ---- layout ---- */
#app{display:none}
.sidebar{position:fixed;top:34px;bottom:0;left:0;width:210px;background:var(--surface);border-right:1px solid var(--border);padding:18px 0;overflow-y:auto;z-index:40}
.sidebar .brand{padding:0 20px 16px;border-bottom:1px solid var(--border);margin-bottom:12px}
.sidebar .brand svg{width:100%;height:auto}
.nav-section{padding:14px 14px 4px;font-size:10.5px;letter-spacing:.09em;text-transform:uppercase;color:var(--text-faint);font-weight:700}
.nav-item{display:flex;align-items:center;gap:10px;padding:9px 18px;margin:1px 8px;border-radius:9px;color:var(--text-muted);font-weight:500;font-size:13.5px;border:none;background:none;width:calc(100% - 16px);text-align:left}
.nav-item:hover{background:var(--surface-2);color:var(--text)}
.nav-item.active{background:var(--primary-light);color:var(--primary-text);font-weight:600}
.nav-item .ico{width:18px;text-align:center;font-size:15px}
.main{margin-left:210px;margin-top:34px;padding:26px 30px 80px}
.page{display:none}
.page.active{display:block;animation:fade .18s ease}
@keyframes fade{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:none}}

/* mobile bottom nav */
.mobile-nav{display:none}
@media(max-width:820px){
  .sidebar{transform:translateX(-100%);transition:transform .2s}
  .sidebar.open{transform:none}
  .main{margin-left:0;padding:18px 16px 90px}
  .mobile-nav{display:flex;position:fixed;bottom:0;left:0;right:0;background:#fff;border-top:1px solid var(--border);z-index:60;justify-content:space-around;padding:6px 0}
  .mobile-nav button{background:none;border:none;font-size:11px;color:var(--text-muted);display:flex;flex-direction:column;align-items:center;gap:2px;padding:4px 8px}
  .mobile-nav button.active{color:var(--primary)}
  .mobile-nav .ico{font-size:18px}
  .menu-btn{display:inline-flex!important}
}
.menu-btn{display:none;position:fixed;top:42px;left:10px;z-index:70;background:#fff;border:1px solid var(--border);border-radius:9px;width:38px;height:38px;font-size:18px;align-items:center;justify-content:center;box-shadow:var(--shadow-sm)}

/* ---- headers ---- */
.page-head{display:flex;justify-content:space-between;align-items:flex-end;flex-wrap:wrap;gap:12px;margin-bottom:20px}
.page-head h1{font-size:24px;font-weight:700;color:var(--text);letter-spacing:-.01em}
.page-head p{color:var(--text-muted);font-size:13.5px;margin-top:2px}

/* ---- cards ---- */
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);box-shadow:var(--shadow-sm);padding:20px}
.card+.card{margin-top:18px}
.card h2{font-size:15px;font-weight:700;margin-bottom:14px;display:flex;align-items:center;gap:8px}
.card h2 .sub{font-weight:500;color:var(--text-faint);font-size:12px}
.grid{display:grid;gap:16px}
.section-title{font-size:12px;letter-spacing:.06em;text-transform:uppercase;color:var(--text-faint);font-weight:700;margin:26px 0 12px}

/* ---- stat tiles ---- */
.stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:16px;margin-bottom:8px}
.stat{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:18px 20px;box-shadow:var(--shadow-sm);position:relative;overflow:hidden}
.stat .label{font-size:12px;color:var(--text-muted);font-weight:600;display:flex;align-items:center;gap:7px}
.stat .value{font-size:30px;font-weight:800;letter-spacing:-.02em;margin-top:6px;color:var(--text)}
.stat .foot{font-size:11.5px;color:var(--text-faint);margin-top:2px}
.stat .ico{font-size:16px}

/* value hero */
.value-hero{display:grid;grid-template-columns:1fr 1fr;gap:1px;background:var(--border);border-radius:var(--radius);overflow:hidden;box-shadow:var(--shadow);border:1px solid var(--border)}
.value-hero .cell{background:linear-gradient(135deg,#0C4A75,#1C86D5);color:#fff;padding:26px 28px}
.value-hero .cell:nth-child(2){background:linear-gradient(135deg,#3a3a3a,#5a5a5a)}
.value-hero .cell .k{font-size:13px;opacity:.85;font-weight:600;display:flex;gap:8px;align-items:center}
.value-hero .cell .v{font-size:42px;font-weight:800;letter-spacing:-.02em;margin-top:6px;line-height:1}
.value-hero .cell .d{font-size:12.5px;opacity:.8;margin-top:8px}
@media(max-width:640px){.value-hero{grid-template-columns:1fr}}

/* ---- buttons ---- */
.btn{display:inline-flex;align-items:center;gap:7px;padding:9px 16px;border-radius:10px;border:1px solid var(--border-strong);background:#fff;color:var(--text);font-weight:600;font-size:13.5px}
.btn:hover{border-color:var(--primary);color:var(--primary)}
.btn.primary{background:var(--primary);border-color:var(--primary);color:#fff}
.btn.primary:hover{background:var(--primary-dark);border-color:var(--primary-dark);color:#fff}
.btn.ghost{border-color:transparent;background:var(--surface-2)}
.btn.sm{padding:6px 11px;font-size:12.5px}
.btn.danger{color:var(--red-text);border-color:var(--red-light)}
.btn.danger:hover{background:var(--red-light);border-color:var(--red)}

/* ---- chips / filters ---- */
.chips{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:16px}
.chip{padding:6px 13px;border-radius:20px;border:1px solid var(--border-strong);background:#fff;font-size:12.5px;font-weight:600;color:var(--text-muted)}
.chip.active{background:var(--primary);border-color:var(--primary);color:#fff}
.search{width:100%;max-width:320px;padding:9px 14px;border:1px solid var(--border-strong);border-radius:10px}
.search:focus{outline:none;border-color:var(--primary)}

/* ---- badges ---- */
.badge{display:inline-flex;align-items:center;gap:5px;padding:3px 9px;border-radius:20px;font-size:11.5px;font-weight:700}
.b-active{background:var(--green-light);color:var(--green-text)}
.b-inactive{background:#eef1f4;color:#64748b}
.b-leave{background:var(--amber-light);color:var(--amber-text)}
.b-summer{background:var(--amber-light);color:var(--amber-text)}
.lvl{padding:2px 9px;border-radius:20px;font-size:11px;font-weight:800;letter-spacing:.02em}
.level-icon{background:linear-gradient(135deg,#F6D365,#FDA085);color:#7a4a10}
.level-legend{background:#EDE9FE;color:#4C1D95}
.level-champion{background:#DBEAFE;color:#0C447C}
.level-pillar{background:#D1FAE5;color:#065F46}
.level-anchor{background:#E0F2FE;color:#075985}
.level-rising{background:#FEF3C7;color:#854F0B}
.level-newcomer{background:#F1F5F9;color:#64748B}

.type-badge{padding:2px 8px;border-radius:6px;font-size:11px;font-weight:600}
.type-delivery-driver{background:#E3F0FB;color:#0C447C}
.type-delivery-assistant{background:#EDEBFB;color:#3B2E9C}
.type-warehouse-am,.type-warehouse-pm{background:#E6F7F5;color:#12655E}
.type-processing{background:#FDF1DF;color:#8A560F}
.type-pack-host-lead{background:#FCEBEB;color:#A32D2D}
.type-pack-host{background:#FDF1DF;color:#8A560F}
.type-admin{background:#ECFDF5;color:#166534}

/* ---- volunteer cards ---- */
.vol-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(230px,1fr));gap:14px}
.vol-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:16px;box-shadow:var(--shadow-sm);cursor:pointer;transition:.12s}
.vol-card:hover{box-shadow:var(--shadow);border-color:var(--border-strong);transform:translateY(-1px)}
.vol-card .top{display:flex;gap:12px;align-items:center}
.avatar{width:46px;height:46px;border-radius:50%;display:flex;align-items:center;justify-content:center;color:#fff;font-weight:700;font-size:16px;flex-shrink:0;overflow:hidden;background-size:cover;background-position:center}
.vol-card .nm{font-weight:700;font-size:14.5px}
.vol-card .meta{font-size:12px;color:var(--text-muted);margin-top:1px}
.vol-card .foot{display:flex;justify-content:space-between;align-items:center;margin-top:12px;padding-top:10px;border-top:1px solid var(--border)}
.vol-card .hrs{font-weight:800;font-size:15px}
.vol-card .hrs span{font-size:11px;color:var(--text-faint);font-weight:600}

/* ---- tables ---- */
table{width:100%;border-collapse:collapse;font-size:13px}
th{text-align:left;padding:9px 10px;color:var(--text-muted);font-weight:700;font-size:11.5px;text-transform:uppercase;letter-spacing:.03em;border-bottom:1px solid var(--border)}
td{padding:10px;border-bottom:1px solid var(--border)}
tr:last-child td{border-bottom:none}
.tbl-wrap{overflow-x:auto}

/* ---- list rows ---- */
.list-row{display:flex;align-items:center;gap:14px;padding:11px 14px;border:1px solid var(--border);border-radius:10px;background:#fff;margin-bottom:8px;cursor:pointer}
.list-row:hover{border-color:var(--border-strong);box-shadow:var(--shadow-sm)}

/* ---- modal / drawer ---- */
.overlay{position:fixed;inset:0;background:rgba(20,40,60,.42);z-index:200;display:none;align-items:center;justify-content:center;padding:20px}
.overlay.open{display:flex}
.modal{background:#fff;border-radius:16px;max-width:560px;width:100%;max-height:90vh;overflow-y:auto;box-shadow:var(--shadow-lg)}
.modal .head{padding:18px 22px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;position:sticky;top:0;background:#fff;z-index:2}
.modal .head h3{font-size:17px;font-weight:700}
.modal .body{padding:20px 22px}
.modal .foot{padding:16px 22px;border-top:1px solid var(--border);display:flex;gap:10px;justify-content:flex-end;position:sticky;bottom:0;background:#fff}
.x{background:none;border:none;font-size:22px;color:var(--text-faint);line-height:1;width:32px;height:32px;border-radius:8px}
.x:hover{background:var(--surface-2);color:var(--text)}
.drawer{position:fixed;top:0;right:0;bottom:0;width:min(480px,94vw);background:#fff;box-shadow:var(--shadow-lg);z-index:210;transform:translateX(100%);transition:transform .22s;overflow-y:auto}
.drawer.open{transform:none}

/* ---- forms ---- */
.field{margin-bottom:14px}
.field label{display:block;font-size:12.5px;font-weight:600;color:var(--text-muted);margin-bottom:5px}
.field input,.field select,.field textarea{width:100%;padding:9px 12px;border:1px solid var(--border-strong);border-radius:9px;background:#fff}
.field input:focus,.field select:focus,.field textarea:focus{outline:none;border-color:var(--primary);box-shadow:0 0 0 3px var(--primary-light)}
.field textarea{resize:vertical;min-height:70px}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.row3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px}
@media(max-width:520px){.row2,.row3{grid-template-columns:1fr}}
.check-list{display:flex;flex-wrap:wrap;gap:8px}
.check-list label{display:inline-flex;align-items:center;gap:6px;padding:6px 11px;border:1px solid var(--border-strong);border-radius:8px;font-size:12.5px;font-weight:600;cursor:pointer;color:var(--text-muted)}
.check-list input{width:auto}

/* ---- misc ---- */
.empty{text-align:center;padding:36px;color:var(--text-faint);font-size:13.5px}
.pill{display:inline-block;padding:2px 8px;border-radius:6px;background:var(--surface-2);font-size:11.5px;font-weight:600;color:var(--text-muted)}
.progress{height:9px;background:var(--surface-2);border-radius:20px;overflow:hidden;margin:8px 0}
.progress .fill{height:100%;background:var(--primary);border-radius:20px;transition:width .5s}
.toast{position:fixed;bottom:22px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--charcoal-dark);color:#fff;padding:11px 20px;border-radius:11px;font-weight:600;font-size:13.5px;z-index:400;opacity:0;transition:.25s;box-shadow:var(--shadow-lg)}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.two-col{display:grid;grid-template-columns:1fr 1fr;gap:18px}
@media(max-width:820px){.two-col{grid-template-columns:1fr}}
.muted{color:var(--text-muted)}
.tabs{display:flex;gap:4px;border-bottom:1px solid var(--border);margin-bottom:16px}
.tab{padding:9px 16px;border:none;background:none;font-weight:600;font-size:13.5px;color:var(--text-muted);border-bottom:2px solid transparent;margin-bottom:-1px}
.tab.active{color:var(--primary);border-bottom-color:var(--primary)}

/* ---- role (view-as) gating ---- */
body[data-role="volunteer"] [data-tier="2"],
body[data-role="volunteer"] [data-tier="3"],
body[data-role="coordinator"] [data-tier="3"]{display:none!important}
.viewas{margin:10px 12px 4px;padding:10px 12px;background:var(--surface-2);border:1px solid var(--border);border-radius:10px}
.viewas .lbl{font-size:10px;letter-spacing:.08em;text-transform:uppercase;color:var(--text-faint);font-weight:700;display:flex;align-items:center;gap:5px}
.viewas select{width:100%;margin-top:6px;padding:7px 9px;border:1px solid var(--border-strong);border-radius:8px;font-weight:600;font-size:13px;background:#fff}
.role-banner{background:linear-gradient(90deg,var(--primary-light),transparent);border:1px solid var(--border);border-left:3px solid var(--primary);border-radius:10px;padding:9px 14px;margin-bottom:16px;font-size:12.5px;color:var(--primary-text);display:none}
body:not([data-role="admin"]) .role-banner{display:block}

/* ---- brand studio ---- */
.brand-logo-preview{display:flex;align-items:center;justify-content:center;min-height:90px;background:var(--surface-2);border:1px dashed var(--border-strong);border-radius:12px;padding:14px}
.brand-logo-preview img{max-width:100%;max-height:80px}
.brand-logo-preview svg{max-width:100%;max-height:80px}
.color-row{display:flex;align-items:center;gap:10px}
.color-row input[type=color]{width:46px;height:38px;padding:2px;border:1px solid var(--border-strong);border-radius:8px;background:#fff;cursor:pointer}
.swatches{display:flex;gap:6px;margin-top:8px;flex-wrap:wrap}
.swatch{width:30px;height:30px;border-radius:7px;border:1px solid rgba(0,0,0,.08);cursor:pointer}
.dropzone{border:2px dashed var(--border-strong);border-radius:12px;padding:20px;text-align:center;color:var(--text-muted);cursor:pointer;transition:.15s}
.dropzone.drag{border-color:var(--primary);background:var(--primary-light)}
#brandLogo img{max-width:100%;max-height:64px;display:block;margin:0 auto}
#brandLogo svg{max-width:100%}
#gateLogo img{max-width:100%;max-height:70px}

/* ---- skill chips ---- */
.skill-chip{display:inline-block;padding:2px 8px;border-radius:6px;font-size:11px;font-weight:600;background:#EEF4FA;color:#0C447C;margin:2px 3px 0 0}
.skill-chip.mut{background:var(--surface-2);color:var(--text-muted)}

/* ---- deliveries module toggle ---- */
body[data-deliveries="off"] .needs-deliveries{display:none!important}

/* ---- warehouse schedule (cleaned up) ---- */
.wh-table{width:100%;border-collapse:separate;border-spacing:0}
.wh-table th{padding:10px 14px}
.wh-table td{padding:14px;vertical-align:middle;border-bottom:1px solid var(--border)}
.wh-table tr:last-child td{border-bottom:none}
.wh-day{width:130px;font-weight:700;color:var(--text)}
.wh-people{display:flex;flex-wrap:wrap;gap:8px}
.wh-chip{display:inline-flex;align-items:center;gap:8px;padding:5px 12px 5px 5px;background:var(--surface-2);border:1px solid var(--border);border-radius:20px;font-size:13px;font-weight:600;color:var(--text)}
.wh-chip .dot{width:24px;height:24px;border-radius:50%;display:flex;align-items:center;justify-content:center;color:#fff;font-size:10px;font-weight:700;flex-shrink:0}
.wh-empty{color:var(--text-faint);font-size:13px;font-style:italic}

/* ---- deliveries editor ---- */
.deliv-table td{vertical-align:middle}
.deliv-cell{display:flex;align-items:center;gap:6px}
.deliv-cell select{flex:1;min-width:120px;padding:7px 9px;border:1px solid var(--border-strong);border-radius:8px}
.lockbtn{width:34px;height:34px;border-radius:8px;border:1px solid var(--border-strong);background:#fff;font-size:14px;flex-shrink:0}
.lockbtn.on{background:var(--primary-light);border-color:var(--primary);color:var(--primary-text)}

/* ---- job generator ---- */
.jobgen-preview{background:#fff;border:1px solid var(--border);border-radius:12px;padding:26px 30px}
.jobgen-preview h1{font-size:22px;color:var(--primary-text)}
.jobgen-preview h3{font-size:14px;text-transform:uppercase;letter-spacing:.04em;color:var(--primary);margin:18px 0 6px}
.jobgen-preview ul{margin:0 0 4px 18px}
.jobgen-preview li{margin-bottom:4px}
.skill-insert{display:inline-block;padding:4px 10px;border-radius:16px;border:1px solid var(--border-strong);background:#fff;font-size:12px;font-weight:600;cursor:pointer;margin:0 4px 6px 0}
.skill-insert:hover{border-color:var(--primary);color:var(--primary)}

@media print{.sidebar,.mobile-nav,#goalBanner,.menu-btn,.no-print,.role-banner{display:none!important}.main{margin:0;padding:0}}
#gate{display:none!important}
</style>
</head>
<body>

<!-- ===================== PASSWORD GATE ===================== -->
<div id="gate">
  <div class="card">
    <div id="gateLogo" class="logo"></div>
    <h1>Volunteer Hub</h1>
    <div class="err" id="gateErr"></div>
    <input type="password" id="gatePw" placeholder="Enter access password" autofocus>
    <button onclick="tryLogin()">Enter →</button>
    <div class="hint">Demo password: <b>demo</b></div>
  </div>
</div>

<!-- ===================== APP ===================== -->
<div id="goalBanner"><div class="track" id="goalTrack"></div></div>
<button class="menu-btn" onclick="document.querySelector('.sidebar').classList.toggle('open')">☰</button>

<div id="app">
  <aside class="sidebar">
    <div class="brand" id="brandLogo"></div>
    <div class="viewas">
      <div class="lbl">👁 View as (demo)</div>
      <select id="roleSel" onchange="setRole(this.value)">
        <option value="admin">Admin — full access</option>
        <option value="coordinator">Coordinator — manage program</option>
        <option value="volunteer">Volunteer — self-service</option>
      </select>
    </div>
    <div class="nav-section">Main</div>
    <button class="nav-item active" data-page="dashboard" data-tier="2" onclick="showPage('dashboard',this)"><span class="ico">◆</span>Dashboard</button>

<script>
/* ============================================================================
   Foundations & Horizons — Volunteer Hub  (demo app logic)
   Data layer: localStorage (Supabase-ready shapes). All data is FAKE seed data.

/* ---------------------------- CONFIG --------------------------------------- */
const CONFIG = {
  ORG_NAME: 'Foundations & Horizons',
  MISSION: 'Nourishing our neighbors — packing and delivering food to families in need across the community.',
  APP_PASSWORD: 'demo',
  HOURLY_VALUE: 34.79,          // Independent Sector volunteer value (edit annually)

  FTE_HOURS: 2080               // hours in one full-time employee-year
};

/* school year (Aug 1 – Jul 31) auto-advances; impact/calendar year for donor reports */
const _now = new Date();
const _syYear = _now.getMonth() >= 7 ? _now.getFullYear() : _now.getFullYear() - 1;
const SCHOOL_YEAR_START = _syYear + '-08-01';
const SCHOOL_YEAR_END   = (_syYear + 1) + '-07-31';
const IMPACT_YEAR       = _now.getFullYear();

const IMPACT_YEAR_END   = IMPACT_YEAR + '-12-31';

const LEVELS = [
  {min:1500,name:'Icon',cls:'level-icon'},
  {min:1000,name:'Legend',cls:'level-legend'},
  {min:750, name:'Champion',cls:'level-champion'},

  {min:250, name:'Anchor',cls:'level-anchor'},
  {min:100, name:'Rising',cls:'level-rising'},

];
function getLevel(h){ return LEVELS.find(l=>h>=l.min); }
const MILESTONES=[100,250,500,750,1000,1500];

/* ---------------------------- BRANDING ------------------------------------- */
/* Brand resolution order: baked BRAND_OVERRIDE (in an exported demo) > saved
   localStorage edits > CONFIG defaults. Lets you brand a demo and export it.  */
const BRAND_DEFAULT={ org:CONFIG.ORG_NAME, mission:CONFIG.MISSION, primary:'#1C86D5', secondary:'#4A4A4A', logo:null,
  outputLabel:'Bags packed', secondaryEnabled:true, secondaryLabel:'Meals', secondaryMultiplier:7, deliveriesEnabled:true };
function resolveBrand(){
  const baked = window.BRAND_OVERRIDE || null;
  let saved=null; try{ saved=JSON.parse(localStorage.getItem('fh_brand')||'null'); }catch(e){}
  return Object.assign({}, BRAND_DEFAULT, saved||{}, baked||{});   // baked wins (exported demo)
}
let BRAND=resolveBrand();
function hexToHsl(hex){ hex=hex.replace('#',''); if(hex.length===3)hex=hex.split('').map(c=>c+c).join('');
  const r=parseInt(hex.slice(0,2),16)/255,g=parseInt(hex.slice(2,4),16)/255,b=parseInt(hex.slice(4,6),16)/255;
  const mx=Math.max(r,g,b),mn=Math.min(r,g,b); let h,s,l=(mx+mn)/2;
  if(mx===mn){h=s=0;} else{ const d=mx-mn; s=l>.5?d/(2-mx-mn):d/(mx+mn);
    h=mx===r?(g-b)/d+(g<b?6:0):mx===g?(b-r)/d+2:(r-g)/d+4; h/=6; }
  return [h*360,s*100,l*100]; }
function hslToHex(h,s,l){ s/=100;l/=100; const k=n=>(n+h/30)%12; const a=s*Math.min(l,1-l);
  const f=n=>{const c=l-a*Math.max(-1,Math.min(k(n)-3,Math.min(9-k(n),1)));return Math.round(255*c).toString(16).padStart(2,'0');};
  return '#'+f(0)+f(8)+f(4); }
function derivePalette(primary){
  const [h,s]=hexToHsl(primary);
  return { primary, dark:hslToHex(h,Math.min(100,s+4),34), light:hslToHex(h,Math.min(100,s*0.7+10),93), text:hslToHex(h,Math.min(100,s+8),26) };
}
function brandLogoHtml(size){ // size: 'full' | 'gate'
  if(BRAND.logo) return `<img src="${BRAND.logo}" alt="${esc(BRAND.org)}">`;
  if(BRAND.org===BRAND_DEFAULT.org && !BRAND.logo && window.LOGO_SVG && BRAND.primary===BRAND_DEFAULT.primary) return window.LOGO_SVG;
  // generated wordmark fallback in the brand color
  const p=derivePalette(BRAND.primary);
  return `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 150" role="img" aria-label="${esc(BRAND.org)}">
    <circle cx="34" cy="75" r="20" fill="${p.primary}"/><circle cx="34" cy="75" r="9" fill="#fff"/>
    <text x="70" y="90" font-family="Georgia,'Times New Roman',serif" font-size="44" font-weight="700" fill="${p.text}">${esc(BRAND.org)}</text></svg>`;
}
function applyBrand(){
  const p=derivePalette(BRAND.primary), root=document.documentElement.style;
  root.setProperty('--primary',p.primary); root.setProperty('--primary-dark',p.dark);
  root.setProperty('--primary-light',p.light); root.setProperty('--primary-text',p.text);
  root.setProperty('--blue',p.primary); root.setProperty('--blue-light',p.light); root.setProperty('--blue-text',p.text);
  root.setProperty('--charcoal',BRAND.secondary);
  CONFIG.ORG_NAME=BRAND.org; CONFIG.MISSION=BRAND.mission;
  document.title=BRAND.org+' — Volunteer Hub';
  const bl=$('#brandLogo'); if(bl) bl.innerHTML=brandLogoHtml('full');
  const gl=$('#gateLogo'); if(gl) gl.innerHTML=brandLogoHtml('gate');
  const gt=$('#goalTrack'); if(gt) gt.textContent=`  ${BRAND.mission}   ·   ${BRAND.org}   ·   `.repeat(3);
  document.body.dataset.deliveries = (BRAND.deliveriesEnabled===false?'off':'on');
}
function saveBrand(){ localStorage.setItem('fh_brand',JSON.stringify(BRAND)); }

/* configurable impact metrics (primary output + optional secondary multiplier) */
function secondaryValue(count){ return BRAND.secondaryEnabled!==false ? Math.round(count*(+BRAND.secondaryMultiplier||0)) : null; }
function impactLine(count){ const s=secondaryValue(count);
  return `${count.toLocaleString()} ${BRAND.outputLabel}` + (s!=null?` · ${s.toLocaleString()} ${BRAND.secondaryLabel}`:''); }

/* ---------------------------- VIEW-AS ROLE --------------------------------- */

}

/* ---------------------------- DATA LAYER ----------------------------------- */
/* localStorage-backed. Mirrors supabase_schema.sql. Swap for sb* fetch later.  */
const DB = {
  KEY:'fh_vhub_v1',
  _d:null,
  _seq:{},
  load(){
    const raw = localStorage.getItem(this.KEY);
    if(raw){ const p=JSON.parse(raw); this._d=p.tables; this._seq=p.seq; }
    else { this.seed(); }
    return this;
  },
  save(){ localStorage.setItem(this.KEY, JSON.stringify({tables:this._d,seq:this._seq})); },
  reset(){ localStorage.removeItem(this.KEY); this._d=null; this._seq={}; this.seed(); },
  _next(t){ this._seq[t]=(this._seq[t]||0)+1; return this._seq[t]; },
  all(t){ return (this._d[t]||[]).slice(); },
  insert(t,row){ if(!this._d[t])this._d[t]=[]; row.id=row.id||this._next(t); this._d[t].push(row); this.save(); return row; },
  update(t,id,patch){ const r=this._d[t].find(x=>x.id==id); if(r)Object.assign(r,patch); this.save(); return r; },
  remove(t,pred){ this._d[t]=(this._d[t]||[]).filter(x=>!pred(x)); this.save(); },
  find(t,pred){ return (this._d[t]||[]).filter(pred); },

  /* ---- seed with fake data ---- */
  seed(){
    this._d={}; this._seq={};
    const iso=d=>d.toISOString().slice(0,10);
    const at=(daysAgo,h=10)=>{ const d=new Date(); d.setDate(d.getDate()-daysAgo); d.setHours(h,0,0,0); return d.toISOString(); };
    const future=(days)=>{ const d=new Date(); d.setDate(d.getDate()+days); return iso(d); };
    const past=(days)=>{ const d=new Date(); d.setDate(d.getDate()-days); return iso(d); };
    const bDay=(offsetFromToday,yearsAgo)=>{ const d=new Date(); d.setDate(d.getDate()+offsetFromToday); d.setFullYear(d.getFullYear()-yearsAgo); return iso(d); };

    // types
    const types=[
      ['Delivery Driver',3,1],['Delivery Assistant',3,2],['Warehouse AM',3,3],['Warehouse PM',3,4],
      ['Processing',3,5],['Pack Host Lead',3,6],['Pack Host',3,7],['Admin',2,8]
    ];
    const typeId={};
    types.forEach(([name,hps,so])=>{ const r=this.insert('volunteer_types',{name,hours_per_signin:hps,sort_order:so}); typeId[name]=r.id; });

    // volunteers  [name, type, status, priorHours, birthdayOffset(or null), startYearsAgo, startOffset]
    const vs=[
      ['Maria Delgado','Delivery Driver','Active',1600, 2, 6, 3],
      ['James Whitfield','Delivery Driver','Active',1080, null, 4, -5],
      ['Aisha Rahman','Warehouse AM','Active',800, 4, 3, 9],
      ['Tom Becker','Delivery Assistant','Active',560, null, 5, 40],
      ['Priya Nair','Processing','Active',300, null, 2, 60],
      ['Carlos Mendez','Warehouse PM','Active',1080, null, 4, 120],
      ['Linda Foster','Admin','Active',800, null, 7, 200],
      ["Kevin O'Brien",'Delivery Driver','Active',560, 6, 3, 15],
      ['Sofia Rossi','Pack Host Lead','Active',300, null, 2, 5],
      ['David Kim','Pack Host','Active',140, null, 1, 220],
      ['Emma Thompson','Warehouse AM','Active',800, null, 3, 33],
      ['Nathan Cole','Delivery Assistant','Active',300, null, 2, 77],
      ['Grace Liu','Processing','Active',140, 1, 1, 300],
      ['Marcus Johnson','Warehouse PM','Active',560, null, 4, 150],
      ['Hannah Berg','Pack Host','Active',40, null, 0, 25],
      ['Omar Haddad','Delivery Driver','Active',1080, null, 5, 90],
      ['Rachel Green','Admin','Active',300, null, 2, 8],
      ['Ben Carter','Warehouse AM','Active',140, null, 1, 260],
      ['Julia Santos','Processing','Active',560, 3, 4, 44],
      ['Ethan Ward','Pack Host Lead','Active',800, null, 3, 12],
      ['Nina Patel','Delivery Assistant','Active',140, null, 1, 310],
      ['Sam Rivera','Warehouse PM','Summer Break',40, null, 0, 20],
      ['Olivia Brooks','Pack Host','Active',40, null, 0, 6],
      ['Wei Chen','Processing','Inactive',300, null, 3, 400]
    ];
    const volByName={};
    vs.forEach((v,i)=>{
      const [name,type,status,prior,bOff,startYrs,startOff]=v;
      const birthday = bOff!==null ? bDay(bOff, 20+(i%30)) : bDay((i*37)%330-160, 22+(i%25));
      const start = past(startYrs*365 + (startOff||0));
      const row=this.insert('volunteers',{
        name,status,birthday,
        phone:'(801) 555-0'+String(100+i).padStart(3,'0'),
        email:name.toLowerCase().replace(/[^a-z]+/g,'.')+'@example.org',
        notes:'', photo_url:null, date_started:start,
        emergency_contact_name:'', emergency_contact_phone:'', created_at:at(startYrs*365)
      });
      volByName[name]=row.id;
      this.insert('volunteer_type_assignments',{volunteer_id:row.id,type_id:typeId[type],is_primary:true});
      // legacy lifetime hours as one historical record
      if(prior>0) this.insert('sign_ins',{volunteer_id:row.id,volunteer_type_id:typeId[type],
        signed_in_at:at(startYrs*365||400,9),signed_out_at:null,hours_credited:prior,notes:'Prior service (imported)',created_at:at(400)});
      // recent activity (skip inactive)
      if(status!=='Inactive'){
        const weeks = status==='Summer Break'?2:12;
        for(let w=0; w<weeks; w++){
          if((i+w)%3===0) continue; // vary cadence
          this.insert('sign_ins',{volunteer_id:row.id,volunteer_type_id:typeId[type],
            signed_in_at:at(w*7+((i)%5),8+((i+w)%4)),signed_out_at:null,hours_credited:3,notes:'',created_at:at(w*7)});
        }
      }
    });
    // a handful of sign-ins TODAY
    ['Maria Delgado','Aisha Rahman','Priya Nair','Ethan Ward','David Kim'].forEach((n,k)=>{

    // schedules (warehouse/processing standing days)
    const days=['Monday','Tuesday','Wednesday','Thursday','Friday'];

      ['Emma Thompson','Warehouse AM',['Tuesday','Thursday']],

      ['Priya Nair','Processing',['Monday','Wednesday']],
      ['Julia Santos','Processing',['Tuesday','Thursday']],
      ['Grace Liu','Processing',['Friday']],
      ['Wei Chen','Processing',['Monday']]];
    sched.forEach(([n,type,dd])=>dd.forEach((d,k)=>this.insert('volunteer_schedules',
      {volunteer_id:volByName[n],type_id:typeId[type],day_of_week:d,position:type,sort_order:k})));

    // standing delivery assignments (recurring default per weekday + role, Mon–Fri)
    const stDrivers={Monday:'Maria Delgado',Tuesday:"Kevin O'Brien",Wednesday:'Omar Haddad',Thursday:'James Whitfield',Friday:'Maria Delgado'};

    // staff
    [['Dana Whitmore','Dana Whitmore','Program Director','dana@example.org','(801) 555-0300'],
     ['Luis Ortega','Luis Ortega','Volunteer Coordinator','luis@example.org','(801) 555-0301'],
     ['Prisha Shah','Prisha Shah','Warehouse Manager','prisha@example.org','(801) 555-0302'],
     ['Gabe Moreno','Gabe Moreno','Operations Lead','gabe@example.org','(801) 555-0303']
    ].forEach(([dn,fn,ti,em,ph])=>this.insert('staff',{display_name:dn,full_name:fn,title:ti,email:em,phone:ph,active:true,created_at:at(365)}));

    // pack events

      {name,event_date:dateStr,event_time:time,lines,location:loc,notes:'',bags_packed:bags,total_volunteers:vols,cancelled:!!cancelled,created_at:at(30)});
    mk('Community Pack Night', past(12),'6:00 PM',2,'Main Warehouse',420,18,false);
    mk('Saturday Morning Pack', past(5),'9:00 AM',3,'Main Warehouse',610,26,false);
    mk('Corporate Volunteer Pack', future(2),'10:00 AM',2,'Main Warehouse',null,null,false);
    mk('Neighborhood Pack', future(4),'5:30 PM',2,'North Site',null,null,false);
    mk('Youth Group Pack', future(11),'4:00 PM',1,'Main Warehouse',null,null,false);
    mk('Weekend Mega Pack', future(18),'9:00 AM',4,'Main Warehouse',null,null,false);

    // signups for upcoming events
    const up=this.all('pack_events').filter(e=>e.event_date>=iso(new Date()) && !e.cancelled);
    if(up[0]){ this.insert('pack_signups',{pack_event_id:up[0].id,volunteer_id:volByName['Ethan Ward'],role:'Event Lead',signed_up_at:at(2)});
               this.insert('pack_signups',{pack_event_id:up[0].id,volunteer_id:volByName['David Kim'],role:'Volunteer',signed_up_at:at(2)}); }
    if(up[1]){ this.insert('pack_signups',{pack_event_id:up[1].id,volunteer_id:volByName['Sofia Rossi'],role:'Event Lead',signed_up_at:at(1)}); }

    // signup month open for current month
    const mkKey=new Date().toISOString().slice(0,7);
    this.insert('pack_signup_months',{month_key:mkKey,signups_open:true,opened_at:at(3)});

    // skills (per-build vocabulary — this demo uses a warehouse/food-bank set)
    const skillNames=['Pallet jack','Can load deliveries','Computer work','Good for admin','Spanish speaker','Heavy lifting','Forklift certified','Bilingual phone support','Event setup'];
    const skillId={};
    skillNames.forEach((n,i)=>{ const r=this.insert('skills',{name:n,sort_order:i}); skillId[n]=r.id; });
    const skillMap={
      'Maria Delgado':['Can load deliveries','Forklift certified','Spanish speaker'],
      'James Whitfield':['Can load deliveries','Heavy lifting'],
      'Aisha Rahman':['Computer work','Good for admin','Bilingual phone support'],
      'Tom Becker':['Pallet jack','Heavy lifting'],
      'Priya Nair':['Computer work'],
      'Carlos Mendez':['Pallet jack','Forklift certified','Spanish speaker'],
      'Linda Foster':['Good for admin','Computer work','Event setup'],
      'Sofia Rossi':['Event setup'],
      'Emma Thompson':['Pallet jack','Can load deliveries'],
      'Ethan Ward':['Event setup','Good for admin'],
      'Julia Santos':['Spanish speaker','Bilingual phone support'],
      'Omar Haddad':['Can load deliveries','Heavy lifting','Forklift certified']
    };
    Object.entries(skillMap).forEach(([n,sk])=>sk.forEach(s=>this.insert('volunteer_skills',{volunteer_id:volByName[n],skill_id:skillId[s]})));

    // evidence item shells

     [10,'Build a volunteer impact report that shows the value to your organization'],
     [11,'Develop or revise your volunteer coordinator job description and prepare a succession plan']
    ].forEach(([n,t])=>this.insert('evidence_items',{item_number:n,title:t,data:{},updated_at:at(0)}));

    this.save();
  },

  /* ---- computed helpers ---- */
  lifetimeHours(vid){ return this.find('sign_ins',s=>s.volunteer_id==vid).reduce((a,s)=>a+(+s.hours_credited||0),0); },
  hoursSince(vid,isoDate){ return this.find('sign_ins',s=>s.volunteer_id==vid && s.signed_in_at.slice(0,10)>=isoDate).reduce((a,s)=>a+(+s.hours_credited||0),0); },
  primaryType(vid){ const a=this.find('volunteer_type_assignments',x=>x.volunteer_id==vid).sort((x,y)=>y.is_primary-x.is_primary)[0];
    return a? this.all('volunteer_types').find(t=>t.id==a.type_id) : null; },
  totalHoursSince(isoDate){ return this.find('sign_ins',s=>s.signed_in_at.slice(0,10)>=isoDate).reduce((a,s)=>a+(+s.hours_credited||0),0); },
  totalHoursAll(){ return this.all('sign_ins').reduce((a,s)=>a+(+s.hours_credited||0),0); },
  bagsSince(isoDate){ return this.all('pack_events').filter(e=>!e.cancelled && e.event_date>=isoDate).reduce((a,e)=>a+(+e.bags_packed||0),0); },
  skillsOf(vid){ const ids=this.find('volunteer_skills',x=>x.volunteer_id==vid).map(x=>x.skill_id);
    return this.all('skills').filter(s=>ids.includes(s.id)).sort((a,b)=>a.sort_order-b.sort_order); },
  allSkills(){ return this.all('skills').sort((a,b)=>a.sort_order-b.sort_order); }
};

/* ---------------------------- UTILITIES ------------------------------------ */
const $=(s,r=document)=>r.querySelector(s);
const $$=(s,r=document)=>[...r.querySelectorAll(s)];
const money=n=>'$'+Math.round(n).toLocaleString('en-US');
const money2=n=>'$'+(+n).toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2});
const fmtDate=iso=>iso?new Date(iso+'T00:00:00').toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'}):'—';
const fmtDT=iso=>new Date(iso).toLocaleDateString('en-US',{month:'short',day:'numeric'})+' '+new Date(iso).toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit'});
const esc=s=>(s==null?'':String(s)).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
function initials(n){ return n.split(/\s+/).map(w=>w[0]).slice(0,2).join('').toUpperCase(); }
function hueFromName(n){ let h=0; for(const c of n) h=(h*31+c.charCodeAt(0))%360; return h; }
function avatarStyle(v){ if(v.photo_url) return `background-image:url('${v.photo_url}')`;
  const h=hueFromName(v.name); return `background:hsl(${h},55%,52%)`; }
function typeSlug(name){ return 'type-'+name.toLowerCase().replace(/\s+/g,'-'); }
function levelBadge(h){ const l=getLevel(h); return `<span class="lvl ${l.cls}">${l.name}</span>`; }
function toast(msg){ const t=$('#toast'); t.textContent=msg; t.classList.add('show'); clearTimeout(t._t); t._t=setTimeout(()=>t.classList.remove('show'),2200); }

/* week helpers */
function mondayOf(d){ const x=new Date(d); const day=(x.getDay()+6)%7; x.setDate(x.getDate()-day); x.setHours(0,0,0,0); return x; }
function weekOfMonth(d){ const day=d.getDay(); let count=0; for(let i=1;i<=d.getDate();i++){ if(new Date(d.getFullYear(),d.getMonth(),i).getDay()===day) count++; } return count; }
const DOW=['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];

function closeModal(){ $('#modalOverlay').classList.remove('open'); }

function programValue(window){ // window: 'school' | 'impact' | 'all'

/* delivery for current week (shared by dashboard + deliveries)
   standing = recurring default; override = this-week confirmation.            */
const DELIV_DAYS=['Monday','Tuesday','Wednesday','Thursday','Friday'];
function weekStartIso(){ return mondayOf(new Date()).toISOString().slice(0,10); }
function standingVol(day,role){ const s=DB.find('delivery_standing',x=>x.day_of_week===day&&x.role===role)[0]; return s?s.volunteer_id:null; }
function overrideName(day,role){ const c=DB.find('delivery_confirmations',x=>x.week_start_date===weekStartIso()&&x.notes===day+'|'+role)[0]; return c?c.confirmed_name:null; }
function volName(id){ const v=DB.all('volunteers').find(x=>x.id==id); return v?v.name:null; }
function currentDelivery(day){
  const dO=overrideName(day,'Driver'), aO=overrideName(day,'Assistant');
  const dS=volName(standingVol(day,'Driver')), aS=volName(standingVol(day,'Assistant'));
  return { driver:dO||dS||'—', driverSet:!!dO, assistant:aO||aS||'—', asstSet:!!aO };
}

  return `<div class="tbl-wrap"><table><thead><tr><th>Day</th><th>Driver</th><th>Assistant</th></tr></thead><tbody>

    return `<tr><td><b>${d.slice(0,3)}</b></td><td>${esc(x.driver)}${x.driverSet?' <span class="badge b-active">✓</span>':''}</td><td>${esc(x.assistant)}${x.asstSet?' <span class="badge b-active">✓</span>':''}</td></tr>`;}).join('')}

function volMatches(v){
  if(VOL_SKILL && !DB.find('volunteer_skills',x=>x.volunteer_id==v.id&&x.skill_id==VOL_SKILL).length) return false;
  if(VOL_SEARCH){ const q=VOL_SEARCH.toLowerCase();
    const inName=v.name.toLowerCase().includes(q);
    const inSkill=DB.skillsOf(v.id).some(s=>s.name.toLowerCase().includes(q));
    if(!inName && !inSkill) return false; }
  if(VOL_FILTER==='all') return true;
  if(['Active','Inactive','Summer Break','On Leave'].includes(VOL_FILTER)) return v.status===VOL_FILTER;
  const t=DB.primaryType(v.id); return t && t.name===VOL_FILTER;
}

function qrPlaceholder(){ // simple decorative QR-like grid (demo)
  let g=''; const n=11; for(let y=0;y<n;y++){ for(let x=0;x<n;x++){ const on=((x*7+y*13+x*y)%3===0)||x<2&&y<2||x>n-3&&y<2||x<2&&y>n-3; g+=`<rect x="${x*12}" y="${y*12}" width="12" height="12" fill="${on?'#1E2A38':'#fff'}"/>`;}}
  return `<svg width="132" height="132" viewBox="0 0 ${n*12} ${n*12}">${g}</svg>`;
}
function doSignIn(){
  const id=+$('#si_vol').value; if(!id){ toast('Pick a name first'); return; }
  const v=DB.all('volunteers').find(x=>x.id==id); const t=DB.primaryType(id);
  const hrs=t?t.hours_per_signin:3;
  DB.insert('sign_ins',{volunteer_id:id,volunteer_type_id:t?t.id:null,signed_in_at:new Date().toISOString(),signed_out_at:null,hours_credited:hrs,notes:'',created_at:new Date().toISOString()});
  const lifetime=DB.lifetimeHours(id);
  // milestone check
  const acked=DB.find('milestone_acknowledgements',m=>m.volunteer_id==id).map(m=>m.milestone_hours);
  const crossed=MILESTONES.filter(m=>lifetime>=m && !acked.includes(m));
  crossed.forEach(m=>DB.insert('milestone_acknowledgements',{volunteer_id:id,milestone_hours:m,acknowledged_at:new Date().toISOString()}));
  // rank this school year
  const board=DB.all('volunteers').map(x=>({id:x.id,h:DB.hoursSince(x.id,SCHOOL_YEAR_START)})).sort((a,b)=>b.h-a.h);
  const rank=board.findIndex(x=>x.id==id)+1;
  const syHrs=DB.hoursSince(id,SCHOOL_YEAR_START);
  // team milestone progress
  const teamHrs=DB.totalHoursSince(SCHOOL_YEAR_START);
  const teamTargets=[500,1000,2500,5000,10000,20000,40000]; const nextTeam=teamTargets.find(x=>x>teamHrs)||teamHrs;
  $('#si_result').innerHTML=`
    <div class="card" style="border:2px solid var(--primary);background:var(--primary-light)">
      ${crossed.length?`<div style="text-align:center;font-size:20px;font-weight:800;color:var(--primary-text);margin-bottom:8px">🎉 Milestone! ${Math.max(...crossed)} hours! 🎉</div>`:''}
      <div style="display:flex;align-items:center;gap:12px"><div class="avatar" style="${avatarStyle(v)};width:52px;height:52px">${v.photo_url?'':initials(v.name)}</div>
        <div><div style="font-size:17px;font-weight:800">${esc(v.name)}</div>${levelBadge(lifetime)}</div></div>
      <div style="display:flex;gap:18px;margin-top:14px;flex-wrap:wrap">
        <div><div class="meta muted">Credited today</div><div style="font-size:22px;font-weight:800">+${hrs} hrs</div></div>
        <div><div class="meta muted">Hours this year</div><div style="font-size:22px;font-weight:800">${Math.round(syHrs)}</div></div>
        <div><div class="meta muted">Team rank</div><div style="font-size:22px;font-weight:800">#${rank}</div></div>
      </div>
      <div style="margin-top:14px"><div class="meta muted">Team progress to ${nextTeam.toLocaleString()} hrs this year</div>
        <div class="progress"><div class="fill" style="width:${Math.min(100,teamHrs/nextTeam*100)}%"></div></div>
        <div class="meta muted">${Math.round(teamHrs).toLocaleString()} / ${nextTeam.toLocaleString()} hours</div></div>
      <div style="text-align:center;margin-top:10px;font-weight:700;color:var(--primary-text)">Thanks for being here! 💙</div>
    </div>`;
  $('#si_vol').value='';
}

  const vols=DB.all('volunteers').filter(v=>v.status==='Active'||v.status==='Summer Break').sort((a,b)=>a.name<b.name?-1:1);
  const opts=(sel)=>`<option value="">— none —</option>`+vols.map(v=>`<option ${sel===v.name?'selected':''} value="${esc(v.name)}">${esc(v.name)}</option>`).join('');
  const cell=(day,role)=>{
    const ov=overrideName(day,role); const stName=volName(standingVol(day,role));
    const locked=!!standingVol(day,role);
    return `<div class="deliv-cell">
      <select onchange="setDeliv('${day}','${role}',this.value)">${opts(ov||stName||'')}</select>
      <button class="lockbtn ${locked?'on':''}" title="${locked?'Standing '+role.toLowerCase()+' for every '+day+' — click to unlock':'Lock in as the standing '+role.toLowerCase()+' for every '+day}" onclick="lockDeliv('${day}','${role}')">${locked?'🔒':'🔓'}</button>
    </div>`;
  };
  $('#page-delivery').innerHTML=`
    <div class="page-head"><div><h1>Deliveries</h1><p>Assign a driver &amp; assistant for each weekday · 🔒 locks someone in for every week</p></div></div>
    <div class="card"><h2>This Week <span class="sub">week of ${fmtDate(mon)}</span></h2>
      <div class="tbl-wrap"><table class="deliv-table"><thead><tr><th class="wh-day">Day</th><th>Driver</th><th>Assistant</th><th></th></tr></thead><tbody>
      ${DELIV_DAYS.map(d=>{ const x=currentDelivery(d);
        return `<tr><td class="wh-day">${d}</td><td>${cell(d,'Driver')}</td><td>${cell(d,'Assistant')}</td><td>${(x.driverSet||x.asstSet)?`<button class="btn sm" onclick="clearWeek('${d}')">Reset week</button>`:'<span class="muted" style="font-size:12px">standing</span>'}</td></tr>`;}).join('')}
      </tbody></table></div>
      <p class="muted" style="font-size:12.5px;margin-top:12px">Changing a name sets it for <b>this week only</b> (a one-off sub — shows a ✓ and a Reset). Click <b>🔒</b> to make someone the standing driver/assistant for that weekday, every week going forward.</p>
    </div>`;
};
function setDeliv(day,role,name){ const ws=weekStartIso();
  DB.remove('delivery_confirmations',c=>c.week_start_date===ws&&c.notes===day+'|'+role);
  if(name) DB.insert('delivery_confirmations',{week_start_date:ws,notes:day+'|'+role,confirmed_name:name,created_at:new Date().toISOString()});
  RENDER.delivery(); }
function lockDeliv(day,role){
  const ov=overrideName(day,role); const stId=standingVol(day,role); const stName=volName(stId);
  const target=ov||stName;
  if(stId && !ov){ // already standing, no new pick -> unlock
    DB.remove('delivery_standing',x=>x.day_of_week===day&&x.role===role);
    toast(`Standing ${role.toLowerCase()} cleared for ${day}`);
  } else {
    if(!target){ toast('Pick a person first'); return; }
    const v=DB.all('volunteers').find(x=>x.name===target);
    DB.remove('delivery_standing',x=>x.day_of_week===day&&x.role===role);
    DB.insert('delivery_standing',{day_of_week:day,role,volunteer_id:v?v.id:null});
    DB.remove('delivery_confirmations',c=>c.week_start_date===weekStartIso()&&c.notes===day+'|'+role);
    toast(`${target} locked in for every ${day}`);
  }
  RENDER.delivery();
}
function clearWeek(day){ const ws=weekStartIso();
  DB.remove('delivery_confirmations',c=>c.week_start_date===ws&&(c.notes===day+'|Driver'||c.notes===day+'|Assistant'));
  RENDER.delivery(); }

function whTable(kind){

  const rows=days.map(d=>{

    const vs=scheds.map(s=>DB.all('volunteers').find(v=>v.id==s.volunteer_id)).filter(v=>v&&v.status!=='Summer Break'&&v.status!=='Inactive');

}

    <div class="head"><h3>Evidence Item 9 — ROVI</h3><button class="x" onclick="closeModal()">×</button></div>
    <div class="body">
      <p class="muted" style="margin-bottom:14px">${esc(EVIDENCE_DEFS[9].intro)}</p>
      <div class="section-title">Step 1 · Program costs (annual)</div>
      ${costRows.map(([k,l])=>`<div class="row2" style="align-items:center;margin-bottom:8px"><label style="font-weight:600;font-size:13px">${l}</label><div style="display:flex;align-items:center;gap:4px"><span class="muted">$</span><input type="number" data-ek="cost_${k}" value="${d['cost_'+k]!=null?d['cost_'+k]:''}" oninput="recalcRovi()" style="width:100%"></div></div>`).join('')}
      <div class="row2" style="align-items:center;border-top:1px solid var(--border);padding-top:10px"><b>Total program cost</b><b id="rv_cost" style="font-size:16px">$0</b></div>

      <div class="section-title">Step 2 · Volunteer hours &amp; value <span class="pill" style="background:var(--primary-light);color:var(--primary-text)">✨ auto-filled</span></div>
      <div class="row2"><div class="field"><label>Total volunteer hours (school year)</label><input type="number" data-ek="total_hours" value="${hours}" oninput="recalcRovi()"></div>
      <div class="field"><label>Hourly value ($)</label><input type="number" step="0.01" data-ek="hourly_value" value="${hourly}" oninput="recalcRovi()"></div></div>
      <div class="row2" style="align-items:center"><b>Total volunteer value</b><b id="rv_value" style="font-size:16px">$0</b></div>

      <div class="section-title">Step 3 · ROVI</div>
      <div class="row2" style="align-items:center;margin-bottom:6px"><span>ROVI = (value − cost) / cost</span><b id="rv_rovi" style="font-size:16px">—</b></div>
      <div class="row2" style="align-items:center"><span>Return per $1 invested = value / cost</span><b id="rv_per" style="font-size:16px">—</b></div>

      <div class="section-title">Step 4 · Report your impact</div>
      <div id="rv_statement" class="card" style="background:var(--primary-light);color:var(--primary-text);font-weight:600"></div>
    </div>
    <div class="foot"><button class="btn" onclick="printEvidence(9)">🖨️ Print</button><button class="btn" onclick="closeModal()">Close</button><button class="btn primary" onclick="saveEvidence(9)">Save</button></div>`);
  recalcRovi();
}
function recalcRovi(){
  let cost=0; $$('#modalBox [data-ek^="cost_"]').forEach(i=>cost+=+i.value||0);
  const hours=+$('#modalBox [data-ek="total_hours"]').value||0;
  const hourly=+$('#modalBox [data-ek="hourly_value"]').value||0;
  const value=hours*hourly; const rovi=cost?(value-cost)/cost:null; const per=cost?value/cost:null;
  $('#rv_cost').textContent=money(cost); $('#rv_value').textContent=money(value);
  $('#rv_rovi').textContent=rovi!=null?rovi.toFixed(2):'—'; $('#rv_per').textContent=per!=null?'$'+per.toFixed(2):'—';
  $('#rv_statement').innerHTML=cost?`For every <b>$1</b> invested in our volunteer program, <b>$${per.toFixed(2)}</b> was returned to the community in volunteer service.`:'Enter program costs to generate your impact statement.';
}
function saveEvidence(n){
  const data={}; $$('#modalBox [data-ek]').forEach(el=>{ const k=el.dataset.ek; data[k]=el.type==='number'?(el.value===''?'':+el.value):el.value; });
  const ev=DB.find('evidence_items',e=>e.item_number==n)[0];
  if(ev) DB.update('evidence_items',ev.id,{data,updated_at:new Date().toISOString()});
  closeModal(); toast(`Evidence Item ${n} saved`); RENDER.evidence();
}
function printEvidence(n){
  const def=EVIDENCE_DEFS[n]; const data={}; $$('#modalBox [data-ek]').forEach(el=>data[el.dataset.ek]=el.value);
  const w=window.open('','_blank'); let rows='';
  if(def.rovi){
    const cost=Object.keys(data).filter(k=>k.startsWith('cost_')).reduce((a,k)=>a+(+data[k]||0),0);
    const value=(+data.total_hours||0)*(+data.hourly_value||0);
    rows=`<h3>Program costs</h3><p>Total program cost: <b>${money(cost)}</b></p><h3>Volunteer value</h3><p>${(+data.total_hours||0).toLocaleString()} hours × ${money2(+data.hourly_value||0)} = <b>${money(value)}</b></p><h3>ROVI</h3><p>ROVI: <b>${cost?((value-cost)/cost).toFixed(2):'—'}</b> · Return per $1: <b>${cost?'$'+(value/cost).toFixed(2):'—'}</b></p>`;
  } else {
    const flat = def.sections?def.sections.flatMap(s=>[['__h',s.h],...s.fields]):def.fields;
    rows=flat.map(f=>f[0]==='__h'?`<h3>${esc(f[1])}</h3>`:`<div style="margin-bottom:12px"><div style="font-weight:700;color:#4A4A4A">${esc(f[1])}</div><div style="white-space:pre-wrap">${esc(data[f[0]]||'—')}</div></div>`).join('');
  }
  w.document.write(`<html><head><title>Evidence Item ${n}</title><style>body{font-family:Georgia,serif;max-width:720px;margin:40px auto;color:#1E2A38;padding:0 20px}h1{color:#1C86D5}h2{color:#4A4A4A}h3{color:#1C86D5;margin-top:22px;border-bottom:1px solid #ddd;padding-bottom:4px}</style></head><body onload="print()"><h1>${esc(CONFIG.ORG_NAME)}</h1><h2>Evidence Item ${n}: ${esc(def.title)}</h2>${rows}</body></html>`);
  w.document.close();
}

function brandSet(f,v){ BRAND[f]=v; saveBrand(); applyBrand();

function brandColor(v){ if(!/^#?[0-9a-fA-F]{3,6}$/.test(v))return; if(v[0]!=='#')v='#'+v;
  BRAND.primary=v; saveBrand(); applyBrand(); const hx=$('#b_hex'); if(hx&&hx.value!==v)hx.value=v; const pv=$('#b_preview'); if(pv)pv.innerHTML=brandLogoHtml('full'); }

  const max=Math.max(0,...DB.allSkills().map(s=>s.sort_order||0)); DB.insert('skills',{name:n,sort_order:max+1}); i.value=''; RENDER.settings(); }

function exportDemo(){
  if($$('script[src]').length){ toast('Open the STANDALONE file to export'); alert('To export a self-contained demo, open the single-file "…STANDALONE.html" version, then Download from here.'); return; }
  const clone=document.documentElement.cloneNode(true);
  clone.removeAttribute('style');                       // let BRAND_OVERRIDE drive colors fresh
  const g=clone.querySelector('#gate'); if(g)g.style.display='';
  const a=clone.querySelector('#app'); if(a)a.style.display='none';
  clone.querySelectorAll('.overlay,.drawer').forEach(o=>o.classList.remove('open'));
  clone.querySelectorAll('body').forEach(b=>b.removeAttribute('data-role'));
  const pw=clone.querySelector('#gatePw'); if(pw)pw.setAttribute('value','');
  clone.querySelectorAll('script[data-brand-override]').forEach(s=>s.remove());
  const s=document.createElement('script'); s.setAttribute('data-brand-override','');
  s.textContent='window.BRAND_OVERRIDE='+JSON.stringify(BRAND)+';';
  clone.querySelector('head').appendChild(s);
  const html='<!DOCTYPE html>\n'+clone.outerHTML;
  const a2=document.createElement('a'); a2.href=URL.createObjectURL(new Blob([html],{type:'text/html'}));
  a2.download=(BRAND.org||'Volunteer-Hub').replace(/[^a-z0-9]+/gi,'-').replace(/^-|-$/g,'')+'-Demo.html'; a2.click();
  toast('Personalized demo downloaded');
}

  const draft=`${CONFIG.ORG_NAME} is on a mission to ${CONFIG.MISSION.replace(/\.$/,'').replace(/^[A-Z]/,c=>c.toLowerCase())}. Our ${title}s play an essential role in making that happen.`;
  jgSet('jg_summary', cur?cur:draft); jgPreview(); toast('Summary drafted — edit as you like'); }
function jgInsertSkill(name){ const el=$('#jg_quals'); el.value=(el.value.trim()?el.value.replace(/\s*$/,'')+'\n':'')+name; jgPreview(); }
function jgData(){ return {title:jgVal('jg_title'),reports_to:jgVal('jg_reports'),location:jgVal('jg_location'),
  summary:jgVal('jg_summary'),responsibilities:jgVal('jg_resp'),time:jgVal('jg_time'),quals:jgVal('jg_quals'),
  benefits:jgVal('jg_benefits'),notes:jgVal('jg_notes')}; }
function jgPostingHtml(d){
  const sec=(h,items)=>items.length?`<h3>${h}</h3><ul>${items.map(i=>`<li>${esc(i)}</li>`).join('')}</ul>`:'';
  const line=(lbl,v)=>v?`<div><b>${lbl}:</b> ${esc(v)}</div>`:'';
  return `<div style="display:flex;align-items:center;gap:12px;margin-bottom:8px">${brandLogoHtml('full').includes('<img')?`<div style="max-height:44px;overflow:hidden">${brandLogoHtml('full')}</div>`:''}<div style="font-weight:800;color:var(--primary-text)">${esc(CONFIG.ORG_NAME)}</div></div>
    <h1>${esc(d.title||'Volunteer Position')}</h1>
    <div class="muted" style="margin-bottom:8px">${line('Reports to',d.reports_to)}${line('Location',d.location)}</div>
    ${d.summary?`<h3>Position Summary</h3><p>${esc(d.summary)}</p>`:''}
    ${sec('Responsibilities',bulletize(d.responsibilities))}
    ${d.time?`<h3>Time Commitment</h3><p>${esc(d.time)}</p>`:''}
    ${sec('Qualifications',bulletize(d.quals))}
    ${sec('Benefits',bulletize(d.benefits))}
    ${d.notes?`<h3>Additional Notes</h3><p>${esc(d.notes)}</p>`:''}`;
}
function jgPreview(){ const box=$('#jgPreviewBox'); if(box) box.innerHTML=jgPostingHtml(jgData()); }
function jgSave(){ const d=jgData(); if(!d.title){ toast('Add a position title first'); return; }
  if(JG_EDIT_ID){ DB.update('job_descriptions',JG_EDIT_ID,{title:d.title,data:d,updated_at:new Date().toISOString()}); }
  else { const r=DB.insert('job_descriptions',{title:d.title,data:d,created_at:new Date().toISOString(),updated_at:new Date().toISOString()}); JG_EDIT_ID=r.id; }
  toast('Posting saved'); jgRenderSaved(); }
function jgRenderSaved(){ const box=$('#jgSaved'); if(!box)return; const rows=DB.all('job_descriptions').sort((a,b)=>a.updated_at<b.updated_at?1:-1);
  box.innerHTML=rows.length?rows.map(r=>`<div class="list-row" style="cursor:default"><div style="flex:1"><b>${esc(r.title)}</b><div class="meta muted">saved ${fmtDT(r.updated_at)}</div></div><button class="btn sm" onclick="jgLoad(${r.id})">Open</button><button class="btn sm danger" onclick="jgDelete(${r.id})">×</button></div>`).join(''):'<div class="empty">No saved postings yet</div>'; }
function jgLoad(id){ const r=DB.all('job_descriptions').find(x=>x.id==id); if(!r)return; const d=r.data; JG_EDIT_ID=id;
  jgSet('jg_title',d.title);jgSet('jg_reports',d.reports_to);jgSet('jg_location',d.location);jgSet('jg_summary',d.summary);
  jgSet('jg_resp',d.responsibilities);jgSet('jg_time',d.time);jgSet('jg_quals',d.quals);jgSet('jg_benefits',d.benefits);jgSet('jg_notes',d.notes);
  jgPreview(); window.scrollTo(0,0); toast('Loaded — edit and Save to update'); }
function jgDelete(id){ if(!confirm('Delete this saved posting?'))return; DB.remove('job_descriptions',x=>x.id==id); if(JG_EDIT_ID==id)JG_EDIT_ID=null; jgRenderSaved(); }
function jgPrint(){ const d=jgData(); const w=window.open('','_blank');
  w.document.write(`<html><head><title>${esc(d.title||'Volunteer Position')} — ${esc(CONFIG.ORG_NAME)}</title><style>body{font-family:Georgia,serif;max-width:720px;margin:40px auto;padding:0 20px;color:#1E2A38}h1{color:${BRAND.primary}}h3{color:${BRAND.primary};text-transform:uppercase;font-size:14px;letter-spacing:.04em;margin:20px 0 6px}ul{margin:0 0 4px 18px}li{margin-bottom:4px}.org{font-weight:800;color:${derivePalette(BRAND.primary).text}}</style></head><body onload="print()"><div class="org">${esc(CONFIG.ORG_NAME)}</div>${jgPostingHtml(d).replace(/class="[^"]*"/g,'')}</body></html>`);
  w.document.close(); }
function jgCopy(){ const d=jgData(); const B=s=>bulletize(s).map(i=>'• '+i).join('\n');
  const parts=[CONFIG.ORG_NAME,'',d.title||'Volunteer Position'];
  if(d.reports_to)parts.push('Reports to: '+d.reports_to); if(d.location)parts.push('Location: '+d.location);
  if(d.summary)parts.push('','POSITION SUMMARY',d.summary);
  if(bulletize(d.responsibilities).length)parts.push('','RESPONSIBILITIES',B(d.responsibilities));
  if(d.time)parts.push('','TIME COMMITMENT',d.time);
  if(bulletize(d.quals).length)parts.push('','QUALIFICATIONS',B(d.quals));
  if(bulletize(d.benefits).length)parts.push('','BENEFITS',B(d.benefits));
  if(d.notes)parts.push('','ADDITIONAL NOTES',d.notes);
  navigator.clipboard?.writeText(parts.join('\n')); toast('Posting copied to clipboard'); }

/* ---------------------------- BOOT ----------------------------------------- */
function boot(){
  applyBrand();
  setRole('admin');
  RENDER.dashboard();
}
document.addEventListener('DOMContentLoaded',()=>{
  DB.load();
  BRAND=resolveBrand();
  applyBrand();                       // brand the gate + colors before login
  document.body.dataset.role='admin';
  showApp(); /* public demo: no password gate */
});

</script>
</body>
</html>
